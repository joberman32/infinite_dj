<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Infinite DJ — Player</title>
  <link rel="stylesheet" href="/player.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="brand">◉ INFINITE_DJ</div>
      <div id="clock"><span id="pos">0:00</span> / <span id="dur">0:00</span></div>
    </header>

    <main id="stage">
      <!-- Prev / current / next track strip, with an inline crossfade fill -->
      <section id="strip">
        <div class="slot prev">
          <div class="slot-label">PREV</div>
          <div id="prev-title" class="slot-title">—</div>
        </div>

        <div class="slot current">
          <div class="slot-label">
            <span id="cur-tag">NOW</span>
            <span id="cur-bpm"></span>
          </div>
          <div id="cur-title" class="slot-title">Loading…</div>
          <div id="xfade" class="xfade hidden">
            <div class="xfade-track"><div id="xfade-fill"></div></div>
            <div class="xfade-pct"><span id="xfade-pct">0%</span></div>
          </div>
        </div>

        <div class="slot next">
          <div class="slot-label">NEXT</div>
          <div id="next-title" class="slot-title">—</div>
        </div>
      </section>

      <!-- Live stereo power meter -->
      <section id="meter">
        <div class="meter-chan">
          <div class="meter-track"><div id="meter-l" class="meter-fill"></div><div id="peak-l" class="peak"></div></div>
          <div class="meter-tag">L</div>
        </div>
        <div class="meter-chan">
          <div class="meter-track"><div id="meter-r" class="meter-fill"></div><div id="peak-r" class="peak"></div></div>
          <div class="meter-tag">R</div>
        </div>
      </section>
    </main>

    <!-- Transport -->
    <footer id="transport">
      <button id="playbtn" aria-label="Play/Pause">▶</button>
      <div id="scrub" class="scrub"><div id="scrub-fill"></div><div id="scrub-head"></div></div>
      <div id="ttime" class="ttime">0:00</div>
    </footer>
  </div>

  <audio id="audio" src="/audio" preload="auto"></audio>
  <script src="/player.js"></script>
</body>
</html>
